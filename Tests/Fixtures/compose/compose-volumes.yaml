services:
  seed:
    image: alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    command: ["sh", "-c", "test -f /data/marker || printf persistent >/data/marker"]
    volumes:
      - data:/data
  reader:
    image: alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    command: ["cat", "/data/marker"]
    volumes:
      - data:/data

volumes:
  data:
    labels:
      dev.cengine.compat: "true"
